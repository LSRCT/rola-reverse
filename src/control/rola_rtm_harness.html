<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ROLA Mini RTM Harness</title>
  <style>
    body {
      margin: 0;
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e1116;
      color: #e8edf2;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 20px;
      font-weight: 650;
    }
    pre {
      min-height: 420px;
      margin: 0;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      background: #171c23;
      border: 1px solid #2b333d;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main>
    <h1>ROLA Mini RTM Harness</h1>
    <pre id="log"></pre>
  </main>
  <script src="/agora-rtm-sdk.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const state = { ready: false, done: false, ok: false, events: [] };

    function log(tag, value) {
      const entry = { ts: new Date().toISOString(), tag, value };
      state.events.push(entry);
      console.log('[[ROLA_RTM_HARNESS]] ' + tag + ' = ' + JSON.stringify(value));
      logEl.textContent += JSON.stringify(entry) + '\n';
    }

    function decodeConfig() {
      const raw = location.hash.replace(/^#/, '');
      if (!raw) throw new Error('missing config hash');
      const padded = raw.replace(/-/g, '+').replace(/_/g, '/') + '==='.slice((raw.length + 3) % 4);
      return JSON.parse(decodeURIComponent(escape(atob(padded))));
    }

    function nowMs() {
      return Date.now();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function messageFor(action, cfg) {
      if (action === 'enter_live') {
        return {
          id: 101003,
          sid: cfg.sid,
          data: { userId: Number(cfg.userId) },
          type: 0,
          timestamp: nowMs(),
        };
      }
      if (action === 'snapshot') {
        return {
          id: 102011,
          type: 0,
          timestamp: nowMs(),
        };
      }
      if (action === 'nudge_forward') {
        return {
          id: 101007,
          sid: cfg.sid,
          data: { lx: 0, ly: 55, rx: 0, ry: 0, buttons: 1 },
          type: 0,
          timestamp: nowMs(),
        };
      }
      if (action === 'nudge_back') {
        return {
          id: 101007,
          sid: cfg.sid,
          data: { lx: 0, ly: -55, rx: 0, ry: 0, buttons: 1 },
          type: 0,
          timestamp: nowMs(),
        };
      }
      if (action === 'turn_left') {
        return {
          id: 101007,
          sid: cfg.sid,
          data: { lx: 0, ly: 0, rx: -55, ry: 0, buttons: 1 },
          type: 0,
          timestamp: nowMs(),
        };
      }
      if (action === 'stop') {
        return {
          id: 101007,
          sid: cfg.sid,
          data: { lx: 0, ly: 0, rx: 0, ry: 0, buttons: 1 },
          type: 0,
          timestamp: nowMs(),
        };
      }
      return {
        id: 101005,
        sid: cfg.sid,
        data: { state: 0 },
        type: 0,
        timestamp: nowMs(),
      };
    }

    function buildSequence(cfg) {
      if (Array.isArray(cfg.sequence) && cfg.sequence.length > 0) return cfg.sequence;
      const action = cfg.action || 'heartbeat';
      if (action === 'wiggle') {
        return [
          { action: 'enter_live', delayAfterMs: 800 },
          { action: 'nudge_forward', delayAfterMs: 450 },
          { action: 'stop', delayAfterMs: 350 },
          { action: 'nudge_back', delayAfterMs: 450 },
          { action: 'stop', delayAfterMs: 2500 },
        ];
      }
      if (action === 'snapshot') {
        return [
          { action: 'enter_live', delayAfterMs: 800 },
          { action: 'heartbeat', delayAfterMs: 500 },
          { action: 'snapshot', delayAfterMs: 8000 },
        ];
      }
      return [{ action, delayAfterMs: Number(cfg.waitMs || 4000) }];
    }

    async function sendAction(client, cfg, action) {
      const payload = messageFor(action, cfg);
      log('SEND_START', { action, peerId: cfg.peerId, payload });
      const sendResult = await client.sendMessageToPeer({ text: JSON.stringify(payload) }, cfg.peerId);
      log('SEND_OK', { action, result: sendResult });
      return sendResult;
    }

    async function run() {
      const cfg = decodeConfig();
      state.config = {
        appId: cfg.appId,
        uid: cfg.uid,
        peerId: cfg.peerId,
        action: cfg.action || 'heartbeat',
      };
      log('CONFIG', state.config);

      const client = AgoraRTM.createInstance(cfg.appId);
      client.on('ConnectionStateChanged', (newState, reason) => {
        log('CONNECTION_STATE', { newState, reason });
      });
      client.on('MessageFromPeer', (message, peerId) => {
        log('MESSAGE_FROM_PEER', { peerId, message });
      });

      log('LOGIN_START', { uid: cfg.uid });
      await client.login({ uid: cfg.uid, token: cfg.token });
      log('LOGIN_OK', { uid: cfg.uid });

      let online = null;
      try {
        online = await client.queryPeersOnlineStatus([cfg.peerId]);
        log('PEER_ONLINE_STATUS', online);
      } catch (err) {
        log('PEER_ONLINE_STATUS_ERROR', String(err && (err.message || err)));
      }

      for (const step of buildSequence(cfg)) {
        await sendAction(client, cfg, step.action || step);
        const delayAfterMs = Number(step.delayAfterMs || 0);
        if (delayAfterMs > 0) await sleep(delayAfterMs);
      }

      state.ready = true;
      state.done = true;
      state.ok = true;
      window.__rolaRtmHarness = state;
    }

    window.__rolaRtmHarness = state;
    run().catch(err => {
      state.done = true;
      state.ok = false;
      state.error = String(err && (err.stack || err.message || err));
      log('ERROR', state.error);
    });
  </script>
</body>
</html>
